services:
  tileserver:
    image: ghcr.io/maplibre/martin:latest
    ports:
      - "3000:3000"
    volumes:
      - ./tiles:/tiles
    command: ["--font", "/tiles/fonts", "/tiles/australia.pmtiles", "/tiles/ocean.pmtiles"]
    restart: unless-stopped

  nominatim:
    image: mediagis/nominatim:4.4
    ports:
      - "8080:8080"
    environment:
      - PBF_URL=https://download.geofabrik.de/australia-oceania/australia-latest.osm.pbf
      - REPLICATION_URL=https://download.geofabrik.de/australia-oceania/australia-updates/
      - NOMINATIM_PASSWORD=nominatim
      - IMPORT_STYLE=full
    volumes:
      - nominatim-data:/var/lib/postgresql/14/main
    restart: unless-stopped
    shm_size: 1g

volumes:
  nominatim-data:
